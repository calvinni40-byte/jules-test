name: Jules AI Agent

on:
  issues:
    types: [labeled]

jobs:
  jules:
    if: github.event.label.name == 'jules'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Invoke Jules
        if: ${{ contains(fromJSON('["calvinni40-byte"]'), github.event.issue.user.login) }}
        uses: google-labs-code/jules-action@v1.0.0
        with:
          prompt: |
            ${{ github.event.issue.title }}
            
            ${{ github.event.issue.body }}
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          starting_branch: 'main'
